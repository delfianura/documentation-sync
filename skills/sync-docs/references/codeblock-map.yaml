# Codeblock Coverage Map — gllm-core tutorials
#
# This file maps every GitBook tutorial page to its constituent code blocks
# and the corresponding cookbook .py file that covers each block.
#
# Structure:
#   <gitbook_page_url>:
#     entry_dir: <cookbook directory relative to gen-ai/tutorials/>
#     blocks:
#       - heading: "## Section Heading"          # heading from the GitBook page
#         gitbook_anchor: "#section-heading"       # URL anchor for this section
#         cookbook_file: <filename>.py             # .py file in the entry dir
#         runnable: true                           # whether this block is standalone runnable
#         notes: "optional notes about this block"
#
# When syncing, the verify_coverage.py script checks that:
# 1. Every block listed here has a corresponding .py file in the cookbook
# 2. Every .py file in the cookbook is listed here (no orphans)
# 3. Each .py file's docstring references the correct GitBook page URL
#
# To extend: add new pages as new top-level keys. Use `verify_coverage.py` to check.

